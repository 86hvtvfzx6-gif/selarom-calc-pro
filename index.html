<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELAROM CALC PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}
header{
background:#1a1a1a;
padding:15px;
font-size:22px;
color:#00ff88;
font-weight:bold;
}
.subtitulo{
font-size:14px;
color:#aaa;
margin-top:-10px;
margin-bottom:10px;
}
.container{
padding:20px;
}
input,select{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}
button{
width:95%;
padding:12px;
margin-top:15px;
background:#00ff88;
border:none;
font-weight:bold;
cursor:pointer;
}
.result{
margin-top:20px;
background:#1e1e1e;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}
.seccion{
margin-top:25px;
border-top:1px solid #333;
padding-top:20px;
}
</style>
</head>

<body>

<header>⚡ SELAROM</header>
<div class="subtitulo">Soluciones Eléctricas</div>

<div class="container">

<!-- ===================== -->
<!-- MÓDULO 1 INGENIERÍA -->
<!-- ===================== -->

<div class="seccion">
<h3>🏠 Cálculo Eléctrico Residencial Monofásico</h3>

<input type="number" id="potencia" placeholder="Potencia total (W)">
<input type="number" id="voltaje" placeholder="Voltaje (127 o 220)">
<input type="number" id="distanciaCalc" placeholder="Distancia (m)">
<button onclick="calcularIngenieria()">CALCULAR INGENIERÍA</button>

<div class="result" id="resultadoIngenieria"></div>
</div>

<!-- ===================== -->
<!-- MÓDULO 2 LISTA -->
<!-- ===================== -->

<div class="seccion">
<h3>📋 Lista Completa de Material</h3>

<input type="number" id="numContactos" placeholder="Número de contactos">
<input type="number" id="numApagadoresS" placeholder="Apagadores sencillos">
<input type="number" id="numApagadoresE" placeholder="Apagadores 3 vías">
<input type="number" id="numApagadores4" placeholder="Apagadores 4 vías">
<input type="number" id="numLuminarias" placeholder="Número de luminarias">
<input type="number" id="distanciaLista" placeholder="Metros aproximados de instalación">

<button onclick="generarLista()">GENERAR LISTA</button>
<button onclick="generarPDF()">GENERAR PDF LISTA</button>

<div class="result" id="resultadoLista"></div>
</div>

</div>

<script>

/* =========================
   MÓDULO 1 – INGENIERÍA
========================= */

function seleccionarCalibre(I){
let Iseg = I*1.25;
if(Iseg<=15) return ["14 AWG","15 A",2.525];
if(Iseg<=20) return ["12 AWG","20 A",1.588];
if(Iseg<=30) return ["10 AWG","30 A",0.999];
if(Iseg<=40) return ["8 AWG","40 A",0.628];
if(Iseg<=55) return ["6 AWG","50 A",0.395];
if(Iseg<=75) return ["4 AWG","70 A",0.248];
if(Iseg<=100) return ["3 AWG","90 A",0.197];
return ["Consultar ingeniería","Especial",0];
}

function calcularIngenieria(){

let P=parseFloat(document.getElementById("potencia").value)||0;
let V=parseFloat(document.getElementById("voltaje").value)||127;
let L=parseFloat(document.getElementById("distanciaCalc").value)||0;

let I=P/V;
let datos=seleccionarCalibre(I);

let vd=(2*L*I*datos[2])/V;
let porcentaje=(vd/V)*100;

document.getElementById("resultadoIngenieria").innerHTML=
"<b>Corriente:</b> "+I.toFixed(2)+" A<br>"+
"<b>Calibre recomendado:</b> "+datos[0]+"<br>"+
"<b>Breaker recomendado:</b> "+datos[1]+"<br>"+
"<b>Caída de tensión:</b> "+porcentaje.toFixed(2)+" %";
}

/* =========================
   MÓDULO 2 – LISTA
========================= */

let listaTexto="";

function generarLista(){

let contactos=parseInt(document.getElementById("numContactos").value)||0;
let apagS=parseInt(document.getElementById("numApagadoresS").value)||0;
let apagE=parseInt(document.getElementById("numApagadoresE").value)||0;
let apag4=parseInt(document.getElementById("numApagadores4").value)||0;
let luminarias=parseInt(document.getElementById("numLuminarias").value)||0;
let metros=parseInt(document.getElementById("distanciaLista").value)||0;

let chalupas=contactos+apagS+apagE+apag4;
let cajasRegistro=Math.ceil(metros/10);

listaTexto=`
📋 LISTA COMPLETA DE MATERIAL RESIDENCIAL

🔌 Acometida y alimentación
Mufa
Tubo galvanizado para acometida
Base para medidor
Interruptor principal
Centro de carga
Barras de tierra
Barra de neutro

🔲 Breakers termomagnéticos
Breaker 15 A
Breaker 20 A
Breaker 25 A
Breaker 30 A
Breaker 40 A
Breaker 50 A
Breaker 60 A
Breaker 80 A
Breaker 100 A

🌎 Sistema de puesta a tierra
Varilla copperweld
Conector para varilla
Cable de tierra

⚡ Conductores eléctricos
Cable #14 AWG
Cable #12 AWG
Cable #10 AWG
Cable #8 AWG
Cable #6 AWG

🧱 Canalización
Cajas de registro 4x4 (${cajasRegistro})
Chalupas (${chalupas})
Tubería PVC o EMT
Coples y conectores

💡 Alumbrado
Luminarias (${luminarias})
Apagadores sencillos (${apagS})
Apagadores 3 vías (${apagE})
Apagadores 4 vías (${apag4})

🔌 Contactos
Contactos duplex (${contactos})

🪟 Placas
Placas 1 ventana
Placas 2 ventanas
Placas 3 ventanas
Placas 4 ventanas
Placas ciegas
Placas GFCI
`;

document.getElementById("resultadoLista").innerText=listaTexto;
}

function generarPDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(20);
doc.text("SELAROM",20,20);

doc.setFontSize(14);
doc.text("Soluciones Eléctricas",20,30);

doc.line(20,40,190,40);

let lineas=doc.splitTextToSize(listaTexto,170);
let y=50;

lineas.forEach(linea=>{
if(y>280){
doc.addPage();
y=20;
}
doc.text(linea,20,y);
y+=6;
});

doc.save("Lista_Material_SELAROM.pdf");
}

</script>

</body>
</html>
