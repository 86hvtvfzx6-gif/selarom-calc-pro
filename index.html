<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELAROM CALC PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff88">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}
header{
    background:#161616;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#00ff88;
}
.container{
    padding:20px;
    max-width:500px;
    margin:auto;
}
.card{
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}
input, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:none;
    font-size:16px;
}
button{
    width:100%;
    padding:14px;
    margin-top:15px;
    background:#00ff88;
    border:none;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
.result{
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    font-size:15px;
}
.green{ background:#113322; }
.yellow{ background:#4d3b00; }
.red{ background:#4d0000; }
</style>
</head>

<body>

<header>SELAROM CALC PRO – Ingeniería Eléctrica</header>

<div class="container">

<div class="card">
<h3>Cálculo Profesional</h3>

<select id="sistema">
<option value="mono">Monofásico</option>
<option value="tri">Trifásico</option>
</select>

<select id="material">
<option value="cobre">Cobre</option>
<option value="aluminio">Aluminio</option>
</select>

<select id="voltaje">
<option value="127">127 V</option>
<option value="220">220 V</option>
<option value="440">440 V</option>
</select>

<select id="limite">
<option value="3">Límite 3%</option>
<option value="5">Límite 5%</option>
</select>

<input type="number" id="potencia" placeholder="Potencia total (Watts)">
<input type="number" id="distancia" placeholder="Distancia (metros)">
<button onclick="calcular()">CALCULAR</button>

<div id="resultado"></div>

</div>
</div>

<script>

// Resistencias en ohm/km
const resistencias = {
cobre: {
"14": 8.286,
"12": 5.211,
"10": 3.277,
"8": 2.061,
"6": 1.296
},
aluminio: {
"14": 13.17,
"12": 8.28,
"10": 5.26,
"8": 3.30,
"6": 2.08
}
};

const ampacidades = {
"14": 15,
"12": 20,
"10": 30,
"8": 40,
"6": 55
};

function calcular(){

let sistema = document.getElementById("sistema").value;
let material = document.getElementById("material").value;
let V = parseFloat(document.getElementById("voltaje").value);
let limite = parseFloat(document.getElementById("limite").value);
let P = parseFloat(document.getElementById("potencia").value);
let L = parseFloat(document.getElementById("distancia").value);

if(!P || !L || P<=0 || L<=0){
document.getElementById("resultado").innerHTML = "Ingrese valores válidos.";
return;
}

// Corriente
let I = (sistema=="mono") ? (P / V) : (P / (Math.sqrt(3)*V));
let I125 = I * 1.25;

let calibres = ["14","12","10","8","6"];
let calibreFinal = "";
let porcentajeVD = 0;

for(let c of calibres){

let R = resistencias[material][c];
let distanciaReal = (sistema=="mono") ? L*2 : L;

let VD = (distanciaReal * I125 * R) / 1000;
porcentajeVD = (VD / V) * 100;

if(I125 <= ampacidades[c] && porcentajeVD <= limite){
calibreFinal = c;
break;
}
}

if(calibreFinal==""){ calibreFinal="Mayor a 6 AWG"; }

let breaker = ampacidades[calibreFinal] ? ampacidades[calibreFinal]+" A" : "Consultar ingeniería";

let claseColor="green";
if(porcentajeVD > limite) claseColor="red";
else if(porcentajeVD > limite*0.8) claseColor="yellow";

document.getElementById("resultado").innerHTML =
`<div class="result ${claseColor}">
<b>Sistema:</b> ${sistema=="mono"?"Monofásico":"Trifásico"}<br>
<b>Material:</b> ${material}<br>
<b>Corriente:</b> ${I.toFixed(2)} A<br>
<b>Corriente 125%:</b> ${I125.toFixed(2)} A<br>
<b>Caída de tensión:</b> ${porcentajeVD.toFixed(2)} %<br>
<b>Calibre recomendado:</b> ${calibreFinal} AWG<br>
<b>Breaker recomendado:</b> ${breaker}
</div>`;
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
