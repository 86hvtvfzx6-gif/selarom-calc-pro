<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELAROM CALC PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}
header{
background:#1a1a1a;
padding:15px;
font-size:22px;
color:#00ff88;
font-weight:bold;
}
.subtitulo{
font-size:14px;
color:#aaa;
margin-top:-10px;
margin-bottom:10px;
}
.container{
padding:20px;
}
input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}
button{
width:95%;
padding:12px;
margin-top:15px;
background:#00ff88;
border:none;
font-weight:bold;
cursor:pointer;
}
.result{
margin-top:20px;
background:#1e1e1e;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}
.seccion{
margin-top:30px;
border-top:1px solid #333;
padding-top:20px;
}
.alerta{
color:#ff4d4d;
font-weight:bold;
}
</style>
</head>

<body>

<header>⚡ SELAROM</header>
<div class="subtitulo">Soluciones Eléctricas</div>

<div class="container">

<!-- ===================== -->
<!-- MÓDULO INGENIERÍA -->
<!-- ===================== -->

<div class="seccion">
<h3>🏠 Cálculo Eléctrico Residencial Monofásico</h3>

<input type="number" id="potencia" placeholder="Potencia total (W)">
<input type="number" id="voltaje" placeholder="Voltaje (127 o 220)">
<input type="number" id="distancia" placeholder="Distancia (m)">

<button onclick="calcularIngenieria()">CALCULAR INGENIERÍA</button>

<div class="result" id="resultadoIngenieria"></div>
</div>

<!-- ===================== -->
<!-- MÓDULO LISTA -->
<!-- ===================== -->

<div class="seccion">
<h3>📋 Lista Completa de Material</h3>

<button onclick="generarLista()">GENERAR LISTA COMPLETA</button>
<button onclick="generarPDF()">GENERAR PDF LISTA</button>

<div class="result" id="resultadoLista"></div>
</div>

</div>

<script>

/* =========================
   SELECCIÓN DE CALIBRE
========================= */

function seleccionarCalibre(I){
let Iseg = I * 1.25;

if(Iseg<=15) return ["14 AWG","15 A",2.525];
if(Iseg<=20) return ["12 AWG","20 A",1.588];
if(Iseg<=30) return ["10 AWG","30 A",0.999];
if(Iseg<=40) return ["8 AWG","40 A",0.628];
if(Iseg<=55) return ["6 AWG","50 A",0.395];
if(Iseg<=75) return ["4 AWG","70 A",0.248];
if(Iseg<=100) return ["3 AWG","90 A",0.197];
return ["Consultar ingeniería","Especial",0];
}

/* =========================
   CÁLCULO INGENIERÍA
========================= */

function calcularIngenieria(){

let P=parseFloat(document.getElementById("potencia").value)||0;
let V=parseFloat(document.getElementById("voltaje").value)||127;
let L=parseFloat(document.getElementById("distancia").value)||0;

let I = P / V;
let datos = seleccionarCalibre(I);

let vd = (2 * L * I * datos[2]) / V;
let porcentaje = (vd / V) * 100;

let advertencia = "";
if(porcentaje > 3){
advertencia = "<br><span class='alerta'>⚠ Caída mayor al 3% — aumentar calibre</span>";
}

document.getElementById("resultadoIngenieria").innerHTML =
"<b>Potencia:</b> "+P+" W<br>"+
"<b>Corriente:</b> "+I.toFixed(2)+" A<br>"+
"<b>Calibre recomendado:</b> "+datos[0]+"<br>"+
"<b>Breaker recomendado:</b> "+datos[1]+"<br>"+
"<b>Caída de tensión:</b> "+porcentaje.toFixed(2)+" %"+
advertencia;

}

/* =========================
   LISTA COMPLETA
========================= */

let listaTexto="";

function generarLista(){

listaTexto = `
📋 LISTA COMPLETA DE MATERIAL RESIDENCIAL

🔌 Acometida y alimentación
Mufa
Tubo galvanizado para acometida
Base para medidor (monofásica o bifásica)
Interruptor principal
Centro de carga
Barras de tierra
Barra de neutro

🔲 Breakers termomagnéticos
Breaker 15 A
Breaker 20 A
Breaker 25 A
Breaker 30 A
Breaker 40 A
Breaker 50 A
Breaker 60 A
Breaker 80 A
Breaker 100 A

🌎 Sistema de puesta a tierra
Varilla copperweld 5/8” x 2.40 m
Conector para varilla
Cable de tierra (verde o desnudo)

⚡ Conductores eléctricos (THW-LS o THHN)
Cable #14 AWG (alumbrado)
Cable #12 AWG (contactos)
Cable #10 AWG (30A)
Cable #8 AWG (40–50A)
Cable #6 AWG (60A)
Negro o rojo (fase)
Blanco (neutro)
Verde (tierra)

🧱 Canalización
Tubo conduit PVC
Tubo EMT
Coples
Conectores
Curvas
Abrazaderas
Cajas de registro 4x4
Chalupas
Tapas
Adaptadores 4x4 a chalupa

💡 Alumbrado
Portalámparas o luminarias LED
Apagadores sencillos
Apagadores de 3 vías
Apagadores de 4 vías
Dimmer

🔌 Contactos
Contactos duplex 15A
Contactos duplex 20A
Contactos con tierra
Contactos GFCI
Contactos 220V

🪟 Placas (tapas)
Placas 1 ventana
Placas 2 ventanas
Placas 3 ventanas
Placas 4 ventanas
Placas ciegas
Placas especiales para GFCI
Placas para TV / datos

🔐 Protección adicional
Interruptor diferencial
Supresor de picos
`;

document.getElementById("resultadoLista").innerText = listaTexto;

}

function generarPDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(20);
doc.text("SELAROM",20,20);

doc.setFontSize(14);
doc.text("Soluciones Eléctricas",20,30);

doc.line(20,40,190,40);

let lineas=doc.splitTextToSize(listaTexto,170);
let y=50;

lineas.forEach(linea=>{
if(y>280){
doc.addPage();
y=20;
}
doc.text(linea,20,y);
y+=6;
});

doc.save("Lista_Completa_Material_SELAROM.pdf");
}

</script>

</body>
</html>
