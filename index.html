<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELAROM CALC PRO 2.0</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}
header{
    background:#1a1a1a;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    color:#00ff88;
}
.container{
    padding:20px;
}
select,input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:none;
    font-size:16px;
}
button{
    width:95%;
    padding:12px;
    margin-top:15px;
    background:#00ff88;
    border:none;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}
.result{
    margin-top:20px;
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
}
.warning{
    color:#ff4d4d;
    font-weight:bold;
}
.ok{
    color:#00ff88;
    font-weight:bold;
}
</style>
</head>

<body>

<header>SELAROM CALC PRO 2.0 – Ingeniería Industrial</header>

<div class="container">

<h3>Cálculo Profesional Industrial</h3>

<select id="sistema">
<option value="mono">Monofásico</option>
<option value="trif">Trifásico</option>
</select>

<select id="modo">
<option value="watts">Ingresar en Watts</option>
<option value="amps">Ingresar en Amperes</option>
</select>

<select id="voltaje">
<option value="127">127 V</option>
<option value="220">220 V</option>
<option value="440">440 V</option>
</select>

<select id="material">
<option value="cobre">Cobre</option>
<option value="aluminio">Aluminio</option>
</select>

<input type="number" id="valor" placeholder="Potencia (W) o Corriente (A)">
<input type="number" id="fp" placeholder="Factor de Potencia (0.8 - 1)" step="0.01">
<input type="number" id="distancia" placeholder="Distancia (metros)">

<button onclick="calcular()">CALCULAR</button>

<div class="result" id="resultado"></div>

</div>

<script>

function calcular(){

let sistema = document.getElementById("sistema").value;
let modo = document.getElementById("modo").value;
let V = parseFloat(document.getElementById("voltaje").value);
let material = document.getElementById("material").value;
let valor = parseFloat(document.getElementById("valor").value);
let FP = parseFloat(document.getElementById("fp").value) || 1;
let D = parseFloat(document.getElementById("distancia").value);

if(!valor || !D){
document.getElementById("resultado").innerHTML="Ingrese todos los datos.";
return;
}

let I = 0;

if(modo === "watts"){
if(sistema === "mono"){
I = valor / (V * FP);
}else{
I = valor / (1.732 * V * FP);
}
}else{
I = valor;
}

let Isegura = I * 1.25;

let tabla = {
"14": material === "cobre" ? 2.525 : 4.016,
"12": material === "cobre" ? 1.588 : 2.525,
"10": material === "cobre" ? 0.999 : 1.588,
"8": material === "cobre" ? 0.628 : 0.999,
"6": material === "cobre" ? 0.395 : 0.628,
"4": material === "cobre" ? 0.248 : 0.395,
"2": material === "cobre" ? 0.156 : 0.248,
"1/0": material === "cobre" ? 0.098 : 0.156
};

let calibres = [
{awg:"14", amp:15},
{awg:"12", amp:20},
{awg:"10", amp:30},
{awg:"8", amp:40},
{awg:"6", amp:55},
{awg:"4", amp:70},
{awg:"2", amp:95},
{awg:"1/0", amp:125}
];

let calibre="Consultar";
let breaker="Consultar";
let resistencia=0;

for(let c of calibres){
if(Isegura <= c.amp){
calibre=c.awg+" AWG";
breaker=c.amp+" A";
resistencia=tabla[c.awg];
break;
}
}

let Vdrop;

if(sistema === "mono"){
Vdrop = (2 * D * Isegura * resistencia) / 1000;
}else{
Vdrop = (1.732 * D * Isegura * resistencia) / 1000;
}

let porcentaje = (Vdrop / V) * 100;

let estadoCaida="";
if(porcentaje > 3){
estadoCaida = "<div class='warning'>⚠ Caída mayor a 3% (Subir calibre)</div>";
}else{
estadoCaida = "<div class='ok'>✔ Caída dentro de límite</div>";
}

document.getElementById("resultado").innerHTML=
"<b>Corriente calculada:</b> "+I.toFixed(2)+" A<br>"+
"<b>Corriente 125%:</b> "+Isegura.toFixed(2)+" A<br>"+
"<b>Calibre recomendado:</b> "+calibre+"<br>"+
"<b>Breaker recomendado:</b> "+breaker+"<br>"+
"<b>Caída de tensión:</b> "+porcentaje.toFixed(2)+" %<br>"+
estadoCaida;

}

</script>

</body>
</html>
