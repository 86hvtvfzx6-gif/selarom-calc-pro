<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELAROM CALC PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}
header{
background:#1a1a1a;
padding:15px;
font-size:22px;
color:#00ff88;
font-weight:bold;
}
.subtitulo{
font-size:14px;
color:#aaa;
margin-top:-10px;
margin-bottom:10px;
}
.container{
padding:20px;
}
input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}
button{
width:95%;
padding:12px;
margin-top:15px;
background:#00ff88;
border:none;
font-weight:bold;
cursor:pointer;
}
.result{
margin-top:20px;
background:#1e1e1e;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}
</style>
</head>

<body>

<header>⚡ SELAROM</header>
<div class="subtitulo">Soluciones Eléctricas</div>

<div class="container">

<h3>Datos del Proyecto</h3>

<input type="number" id="numContactos" placeholder="Número de contactos">
<input type="number" id="numApagadoresS" placeholder="Apagadores sencillos">
<input type="number" id="numApagadoresE" placeholder="Apagadores 3 vías">
<input type="number" id="numApagadores4" placeholder="Apagadores 4 vías">
<input type="number" id="numLuminarias" placeholder="Número de luminarias">
<input type="number" id="distancia" placeholder="Metros aproximados de instalación">

<button onclick="calcular()">GENERAR LISTA DE MATERIAL</button>
<button onclick="generarPDF()">GENERAR REPORTE PDF</button>

<div class="result" id="resultado"></div>

</div>

<script>

let listaTexto = "";

function calcular(){

let contactos=parseInt(document.getElementById("numContactos").value)||0;
let apagS=parseInt(document.getElementById("numApagadoresS").value)||0;
let apagE=parseInt(document.getElementById("numApagadoresE").value)||0;
let apag4=parseInt(document.getElementById("numApagadores4").value)||0;
let luminarias=parseInt(document.getElementById("numLuminarias").value)||0;
let metros=parseInt(document.getElementById("distancia").value)||0;

let chalupas=contactos+apagS+apagE+apag4;
let cajasRegistro=Math.ceil(metros/10);

listaTexto = `
📋 LISTA COMPLETA DE MATERIAL RESIDENCIAL

🔌 Acometida y alimentación
Mufa
Tubo galvanizado para acometida
Base para medidor
Interruptor principal
Centro de carga
Barras de tierra
Barra de neutro

🔲 Breakers termomagnéticos
Breaker 15 A
Breaker 20 A
Breaker 25 A
Breaker 30 A
Breaker 40 A
Breaker 50 A
Breaker 60 A
Breaker 80 A
Breaker 100 A

🌎 Sistema de puesta a tierra
Varilla copperweld 5/8” x 2.40 m
Conector para varilla
Cable de tierra

⚡ Conductores eléctricos (THW-LS o THHN)
Cable #14 AWG
Cable #12 AWG
Cable #10 AWG
Cable #8 AWG
Cable #6 AWG
Negro o rojo (fase)
Blanco (neutro)
Verde (tierra)

🧱 Canalización
Tubo conduit PVC o EMT
Coples
Conectores
Curvas
Abrazaderas
Cajas de registro 4x4 (${cajasRegistro})
Chalupas (${chalupas})
Tapas
Adaptadores 4x4 a chalupa

💡 Alumbrado
Luminarias (${luminarias})
Apagadores sencillos (${apagS})
Apagadores 3 vías (${apagE})
Apagadores 4 vías (${apag4})
Dimmer (opcional)

🔌 Contactos
Contactos duplex 15A (${contactos})
Contactos duplex 20A
Contactos con tierra
Contactos GFCI
Contactos 220V

🪟 Placas (tapas)
Placas 1 ventana
Placas 2 ventanas
Placas 3 ventanas
Placas 4 ventanas
Placas ciegas
Placas especiales para GFCI
Placas para TV / datos

🔐 Protección adicional
Interruptor diferencial
Supresor de picos
`;

document.getElementById("resultado").innerText = listaTexto;

}

function generarPDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(20);
doc.text("SELAROM",20,20);

doc.setFontSize(14);
doc.text("Soluciones Eléctricas",20,30);

doc.setFontSize(11);
doc.text("Contacto: 951 849 3149",20,38);

doc.line(20,42,190,42);

doc.setFontSize(10);

let lineas = doc.splitTextToSize(listaTexto,170);
let y=55;

lineas.forEach(linea=>{
if(y>280){
doc.addPage();
y=20;
}
doc.text(linea,20,y);
y+=6;
});

doc.save("Lista_Completa_Material_SELAROM.pdf");
}

</script>

</body>
</html>
