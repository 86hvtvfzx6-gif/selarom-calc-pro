<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SELAROM CALC PRO TOTAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}
header{
background:#1a1a1a;
padding:15px;
font-size:22px;
color:#00ff88;
font-weight:bold;
}
.subtitulo{
font-size:14px;
color:#aaa;
margin-top:-10px;
margin-bottom:10px;
}
.container{
padding:20px;
}
input,select{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:none;
}
button{
width:95%;
padding:12px;
margin-top:15px;
background:#00ff88;
border:none;
font-weight:bold;
cursor:pointer;
}
.result{
margin-top:20px;
background:#1e1e1e;
padding:15px;
border-radius:10px;
text-align:left;
}
</style>
</head>

<body>

<header>⚡ SELAROM</header>
<div class="subtitulo">Soluciones Eléctricas</div>

<div class="container">

<select id="tipoSistema">
<option value="residencial">Residencial</option>
<option value="mono">Comercial Monofásico</option>
<option value="trifasico">Comercial Trifásico</option>
</select>

<input type="number" id="potencia" placeholder="Potencia total (W)">
<input type="number" id="voltaje" placeholder="Voltaje (127 / 220 / 440)">
<input type="number" id="distancia" placeholder="Distancia (m)">
<input type="number" id="fp" placeholder="Factor de potencia (si aplica)">
<input type="number" id="precioMetro" placeholder="Precio por metro de cable ($)">
<input type="number" id="manoObra" placeholder="Costo mano de obra ($)">

<button onclick="calcular()">CALCULAR</button>
<button onclick="generarPDF()">GENERAR REPORTE PDF</button>

<div class="result" id="resultado"></div>

</div>

<script>

let datosGlobal={};

function seleccionarCalibre(I){
let Iseg = I*1.25;
if(Iseg<=15) return ["14 AWG","15 A",2.525];
if(Iseg<=20) return ["12 AWG","20 A",1.588];
if(Iseg<=30) return ["10 AWG","30 A",0.999];
if(Iseg<=40) return ["8 AWG","40 A",0.628];
if(Iseg<=55) return ["6 AWG","50 A",0.395];
if(Iseg<=75) return ["4 AWG","70 A",0.248];
if(Iseg<=100) return ["3 AWG","90 A",0.197];
return ["Consultar ingeniería","Especial",0];
}

function calcular(){
let P=parseFloat(document.getElementById("potencia").value)||0;
let V=parseFloat(document.getElementById("voltaje").value)||127;
let L=parseFloat(document.getElementById("distancia").value)||0;
let fp=parseFloat(document.getElementById("fp").value)||1;
let precioMetro=parseFloat(document.getElementById("precioMetro").value)||0;
let manoObra=parseFloat(document.getElementById("manoObra").value)||0;
let tipo=document.getElementById("tipoSistema").value;

let I=0;

if(tipo==="trifasico"){
I=P/(1.732*V*fp);
}else{
I=P/V;
}

let datos=seleccionarCalibre(I);

let vd=(2*L*I*datos[2])/V;
let porcentaje=(vd/V)*100;

// Material
let metrosCable=L*2; // ida y vuelta
let costoCable=metrosCable*precioMetro;

// Breaker estimado precio base
let precioBreaker=800;
let totalMaterial=costoCable+precioBreaker;
let totalProyecto=totalMaterial+manoObra;

datosGlobal={
I,datos,porcentaje,
metrosCable,costoCable,precioBreaker,
totalMaterial,manoObra,totalProyecto
};

document.getElementById("resultado").innerHTML=
"<h3>RESULTADOS TÉCNICOS</h3>"+
"<b>Corriente:</b> "+I.toFixed(2)+" A<br>"+
"<b>Calibre:</b> "+datos[0]+"<br>"+
"<b>Breaker:</b> "+datos[1]+"<br>"+
"<b>Caída de tensión:</b> "+porcentaje.toFixed(2)+" %<br><br>"+

"<h3>LISTA DE MATERIAL</h3>"+
"• Cable "+datos[0]+" - "+metrosCable+" m<br>"+
"• Breaker "+datos[1]+"<br><br>"+

"<h3>PRESUPUESTO</h3>"+
"Material: $"+totalMaterial.toFixed(2)+"<br>"+
"Mano de obra: $"+manoObra.toFixed(2)+"<br>"+
"<b>Total proyecto: $"+totalProyecto.toFixed(2)+"</b>";
}

function generarPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(20);
doc.text("SELAROM",20,20);

doc.setFontSize(14);
doc.text("Soluciones Eléctricas",20,30);

doc.setFontSize(11);
doc.text("Contacto: 951 849 3149",20,38);

doc.line(20,42,190,42);

doc.setFontSize(12);
doc.text("RESULTADOS TÉCNICOS",20,55);
doc.text("Corriente: "+datosGlobal.I.toFixed(2)+" A",20,63);
doc.text("Calibre: "+datosGlobal.datos[0],20,70);
doc.text("Breaker: "+datosGlobal.datos[1],20,77);
doc.text("Caída de tensión: "+datosGlobal.porcentaje.toFixed(2)+" %",20,84);

doc.text("LISTA DE MATERIAL",20,100);
doc.text("Cable "+datosGlobal.datos[0]+" - "+datosGlobal.metrosCable+" m",20,108);
doc.text("Breaker "+datosGlobal.datos[1],20,115);

doc.text("PRESUPUESTO",20,130);
doc.text("Material: $"+datosGlobal.totalMaterial.toFixed(2),20,138);
doc.text("Mano de obra: $"+datosGlobal.manoObra.toFixed(2),20,145);
doc.text("Total proyecto: $"+datosGlobal.totalProyecto.toFixed(2),20,152);

doc.save("Reporte_SELAROM.pdf");
}

</script>

</body>
</html>
